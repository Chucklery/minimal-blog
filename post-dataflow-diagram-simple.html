<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>minimal-blog 简化版数据流图</title>
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --line: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --frontend: #22d3ee;
      --backend: #34d399;
      --db: #a78bfa;
      --build: #fbbf24;
      --static: #fb923c;
      --accent: #7c3aed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "JetBrains Mono", Consolas, monospace;
      background: var(--bg);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    .sub { color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
    .panel {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      overflow: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    svg { width: 100%; height: auto; min-width: 1100px; }
    .notes {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .card h3 { margin: 0 0 8px; font-size: 15px; }
    .card p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>minimal-blog 简化版数据流图</h1>
    <div class="sub">
      只保留 3 条主干：保存草稿、发布、删除。<br>
      核心结论：后台管理页读 SQLite；公开前台不是直接读 DB，而是走 Markdown + build 后的 dist HTML。
    </div>

    <div class="panel">
      <svg viewBox="0 0 1120 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="minimal-blog simplified data flow">
        <defs>
          <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
          </marker>
          <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
          </marker>
          <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
          </marker>
          <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
          </marker>
        </defs>

        <rect x="24" y="24" width="1072" height="712" rx="18" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="8 6"/>

        <text x="50" y="60" fill="#94a3b8" font-size="18">后台管理主链路</text>
        <text x="710" y="60" fill="#94a3b8" font-size="18">公开前台主链路</text>

        <path d="M 250 140 C 315 140, 335 140, 400 140" stroke="#22d3ee" stroke-width="3" fill="none" marker-end="url(#arrow-cyan)"/>
        <path d="M 620 140 C 685 140, 705 140, 810 140" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>

        <path d="M 250 360 C 315 360, 335 360, 400 360" stroke="#22d3ee" stroke-width="3" fill="none" marker-end="url(#arrow-cyan)"/>
        <path d="M 620 360 C 680 360, 705 360, 780 360" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
        <path d="M 980 360 C 1010 360, 1030 360, 1060 360" stroke="#fbbf24" stroke-width="3" fill="none" marker-end="url(#arrow-amber)"/>

        <path d="M 250 580 C 315 580, 335 580, 400 580" stroke="#22d3ee" stroke-width="3" fill="none" marker-end="url(#arrow-cyan)"/>
        <path d="M 620 580 C 690 580, 720 580, 810 580" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>

        <g transform="translate(60,100)">
          <rect width="190" height="80" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
          <text x="16" y="30" fill="#22d3ee" font-size="18" font-weight="700">编辑页 / 列表页</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">用户点 Save Draft</text>
        </g>

        <g transform="translate(400,100)">
          <rect width="220" height="80" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
          <text x="16" y="30" fill="#34d399" font-size="18" font-weight="700">POST /api/posts/draft</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">后端保存到 posts 表</text>
        </g>

        <g transform="translate(810,100)">
          <rect width="240" height="80" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
          <text x="16" y="30" fill="#a78bfa" font-size="18" font-weight="700">SQLite /admin/posts</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">刷新后台列表就能看到草稿</text>
        </g>

        <g transform="translate(60,320)">
          <rect width="190" height="80" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
          <text x="16" y="30" fill="#22d3ee" font-size="18" font-weight="700">点击 Publish</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">先保存，再调 publish API</text>
        </g>

        <g transform="translate(400,320)">
          <rect width="220" height="80" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
          <text x="16" y="30" fill="#34d399" font-size="18" font-weight="700">POST /api/posts/:id/publish</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">更新 DB + 触发 buildPublish()</text>
        </g>

        <g transform="translate(780,320)">
          <rect width="200" height="80" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
          <text x="16" y="30" fill="#fbbf24" font-size="18" font-weight="700">写 Markdown</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">site/content/posts/*.md</text>
        </g>

        <g transform="translate(1060,320)">
          <rect width="0" height="0" fill="none"/>
        </g>

        <g transform="translate(60,540)">
          <rect width="190" height="80" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
          <text x="16" y="30" fill="#22d3ee" font-size="18" font-weight="700">点击 Delete</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">列表页发 DELETE 请求</text>
        </g>

        <g transform="translate(400,540)">
          <rect width="220" height="80" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
          <text x="16" y="30" fill="#34d399" font-size="18" font-weight="700">DELETE /api/posts/:id</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">后端删 DB 记录</text>
        </g>

        <g transform="translate(810,540)">
          <rect width="240" height="80" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
          <text x="16" y="30" fill="#a78bfa" font-size="18" font-weight="700">后台列表消失</text>
          <text x="16" y="54" fill="#e5e7eb" font-size="12">当前页 row.remove()，刷新后也没了</text>
        </g>

        <path d="M 930 180 C 930 220, 930 250, 930 300" stroke="#fb923c" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
        <path d="M 930 400 C 930 440, 930 470, 930 520" stroke="#fb923c" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>

        <g transform="translate(760,210)">
          <rect width="320" height="70" rx="12" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
          <text x="16" y="28" fill="#fb923c" font-size="17" font-weight="700">公开站不是直接读 SQLite</text>
          <text x="16" y="52" fill="#e5e7eb" font-size="12">它读的是 build 后生成的 dist/posts/*.html</text>
        </g>

        <g transform="translate(760,430)">
          <rect width="320" height="70" rx="12" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
          <text x="16" y="28" fill="#fb923c" font-size="17" font-weight="700">发布后前台才会更新</text>
          <text x="16" y="52" fill="#e5e7eb" font-size="12">Markdown -> build.js -> dist HTML -> 8088 预览</text>
        </g>
      </svg>
    </div>

    <div class="notes">
      <div class="card">
        <h3>草稿</h3>
        <p>草稿只进 SQLite，所以后台能看到，公开前台看不到。</p>
      </div>
      <div class="card">
        <h3>发布</h3>
        <p>发布不是单纯改状态，还会把内容落到 Markdown，并重新 build 静态站。</p>
      </div>
      <div class="card">
        <h3>删除</h3>
        <p>删除先删数据库，再把当前列表行从 DOM 里移掉，所以看起来是“立刻消失”。</p>
      </div>
    </div>
  </div>
</body>
</html>
