# nginx/minimal-blog.conf
server {
    listen 8088;
    server_name localhost;

    root D:/workspace/others/minimal-blog/dist;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml application/rss+xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /uploads {
        alias D:/workspace/others/minimal-blog/backend/uploads;
    }

    location /health {
        proxy_pass http://127.0.0.1:8055;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|webp|avif|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(html|xml|txt)$ {
        add_header Cache-Control "no-cache";
    }
}
